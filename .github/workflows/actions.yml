name: ci

on:
  # push:
  #   branches:
  #     - main
  #   tags:
  #     - "*"
  pull_request:
    branches:
      - main
  workflow_dispatch: # be able to manually trigger a workflow run

env:
  # SCALA_NEXT_VERSION: "3.8.2"
  # GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  VCPKG_FEATURE_FLAGS: dependencygraph

jobs:
  test-linux:
    runs-on: ubuntu-latest
    strategy:
      # fail-fast: false
      matrix:
        java: ["11", "17", "21", "25"]
    steps:
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: "temurin"
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - uses: actions/checkout@v6
      - uses: coursier/cache-action@v7
      - uses: coursier/setup-action@v2
        with:
          apps: mill

      - name: Run tests for Java HTTP Client
        run: ./mill modules.java-http-client.test snhttp.java.net

      # - name: Run tests
      #   run: ./mill -i -DscalaNextVersion=${{ env.SCALA_NEXT_VERSION }} __.test

  test-windows:
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: "x64-windows-static"
      VCPKG_ROOT: "${{ github.workspace }}/vcpkg"
    strategy:
      # fail-fast: false
      matrix:
        java: ["11", "17", "21", "25"]
        vcpkgCommitId: ["66c0373dc7fca549e5803087b9487edfe3aca0a1"] # vcpkg 2026.01.16 Release
    steps:
      - name: print environment variables
        run: env
        
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: "temurin"

      - uses: actions/checkout@v6

      - name: Restore cached vcpkg artifacts
        id: cache-vcpkg-artifacts
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.VCPKG_ROOT }}/installed/x64-windows-static
          key: vcpkg-${{ matrix.vcpkgCommitId }}-${{ runner.os }}-${{ hashFiles('**/vcpkg.json') }}

      - id: run-vcpkg
        uses: lukka/run-vcpkg@v11.5
        if: steps.cache-vcpkg-artifacts.outputs.cache-hit != 'true'
        with:
          vcpkgGitCommitId: '${{ matrix.vcpkgCommitId }}'
          runVcpkgInstall: true

      - name: Save vcpkg cache
        if: steps.run-vcpkg.outcome == 'success'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.VCPKG_ROOT }}/installed/x64-windows-static
          key: vcpkg-${{ matrix.vcpkgCommitId }}-${{ runner.os }}-${{ hashFiles('**/vcpkg.json') }}

      - uses: coursier/cache-action@v7
      - uses: coursier/setup-action@v2
        with:
          apps: mill

      - name: Run tests for Java HTTP Client
        env:
          SCALANATIVE_INCLUDE_DIRS: "${{ env.VCPKG_ROOT }}/installed/x64-windows-static/include"
          SCALANATIVE_LIB_DIRS: "${{ env.VCPKG_ROOT }}/installed/x64-windows-static/lib"
        run: ./mill modules.java-http-client.test snhttp.java.net

  publish-sonatype:
    if: github.repository == 'lqhuang/scala-native-http' && contains(github.ref, 'refs/tags/')
    needs:
      - test-linux
      - test-windows
    runs-on: ubuntu-latest
    env:
      SONATYPE_PGP_PRIVATE_KEY: ${{ secrets.SONATYPE_PGP_PRIVATE_KEY }}
      SONATYPE_PGP_PRIVATE_KEY_PASSWORD: ${{ secrets.SONATYPE_PGP_PRIVATE_KEY_PASSWORD }}
      SONATYPE_USER: ${{ secrets.SONATYPE_USER }}
      SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      LANG: "en_US.UTF-8"
      LC_MESSAGES: "en_US.UTF-8"
      LC_ALL: "en_US.UTF-8"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: "temurin"
      - uses: coursier/cache-action@v7
      - uses: coursier/setup-action@v2
        with:
          apps: mill

      - name: Publish to Maven Central
        run: |
          if [[ $(git tag --points-at HEAD) != '' ]]; then
            echo $SONATYPE_PGP_PRIVATE_KEY | base64 --decode > gpg_key
            gpg --import --no-tty --batch --yes gpg_key
            rm gpg_key
            ./mill -i mill.scalalib.PublishModule/publishAll \
              --sonatypeCreds $SONATYPE_USER:$SONATYPE_PASSWORD \
              --gpgArgs --passphrase=$SONATYPE_PGP_PRIVATE_KEY_PASSWORD,--no-tty,--pinentry-mode,loopback,--batch,--yes,-a,-b \
              --publishArtifacts __.publishArtifacts \
              --readTimeout 600000 \
              --awaitTimeout 600000 \
              --release true \
              --signed true
          fi
      - name: Create GitHub Release
        id: create_gh_release
        # WARN: `actions/create-release` is currently unmaintained. It just works now, keep it until it breaks.
        uses: actions/create-release@v1.1.4
        env:
          # This token is provided by Actions, you do not need to create your own token
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: ${{ github.ref }}
          # body:
          draft: false
